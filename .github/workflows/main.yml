name: Update Stock Data
on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        pip install akshare pandas --quiet
    - name: Update stock data
      run: |
        python update_stock_data.py || echo "Script failed but continuing"
    - name: Commit changes
      run: |
        git config user.email "action@github.com"
        git config user.name "GitHub Action"
        git add stock_data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update stock data - $(date +%Y-%m-%d)" && git push)
