<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神奇九转选股系统 - 实时数据版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
        }
        
        .update-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        
        .update-time {
            color: #888;
            font-size: 13px;
        }
        
        .refresh-btn {
            padding: 8px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            background: #5a6fd6;
        }
        
        .refresh-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .legend-bar {
            background: rgba(255,255,255,0.95);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            align-items: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #444;
        }
        
        .legend-box {
            width: 18px;
            height: 18px;
            border-radius: 4px;
        }
        
        .legend-up { background: #ff4757; }
        .legend-down { background: #2ed573; }
        .legend-none { background: #ddd; }
        
        .stats-bar {
            display: flex;
            gap: 15px;
            margin-left: auto;
        }
        
        .stat-item {
            background: #f8f9fa;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
        }
        
        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }
        
        .stock-card {
            background: rgba(255,255,255,0.98);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .stock-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: #ddd;
        }
        
        .stock-card.signal-up::before { background: #ff4757; }
        .stock-card.signal-down::before { background: #2ed573; }
        
        .stock-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }
        
        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        
        .stock-info h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 4px;
        }
        
        .stock-code {
            font-size: 12px;
            color: #999;
            background: #f5f5f5;
            padding: 2px 8px;
            border-radius: 4px;
        }
        
        .market-tag {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            margin-left: 6px;
            font-weight: 600;
        }
        
        .market-a { background: #e3f2fd; color: #1976d2; }
        .market-hk { background: #fce4ec; color: #c2185b; }
        .market-us { background: #f3e5f5; color: #7b1fa2; }
        
        .price-section {
            text-align: right;
        }
        
        .current-price {
            font-size: 26px;
            font-weight: 700;
        }
        
        .price-up { color: #ff4757; }
        .price-down { color: #2ed573; }
        
        .change-pct {
            font-size: 14px;
            margin-top: 4px;
        }
        
        .signal-section {
            background: linear-gradient(135deg, #f8f9fa 0%, #fff 100%);
            border-radius: 12px;
            padding: 18px;
            margin-top: 15px;
        }
        
        .signal-title {
            font-size: 12px;
            color: #888;
            margin-bottom: 12px;
            text-align: center;
        }
        
        .sequence-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 12px;
        }
        
        .seq-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            background: #e8e8e8;
            color: #999;
            transition: all 0.3s;
        }
        
        .seq-dot.active {
            background: #667eea;
            color: white;
        }
        
        .seq-dot.up-highlight {
            background: #ff4757;
            color: white;
            animation: pulse-red 1.5s infinite;
            box-shadow: 0 0 10px rgba(255,71,87,0.5);
        }
        
        .seq-dot.down-highlight {
            background: #2ed573;
            color: white;
            animation: pulse-green 1.5s infinite;
            box-shadow: 0 0 10px rgba(46,213,115,0.5);
        }
        
        @keyframes pulse-red {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        
        @keyframes pulse-green {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        
        .signal-text {
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            padding: 8px;
            border-radius: 8px;
        }
        
        .signal-up-text {
            color: #ff4757;
            background: rgba(255,71,87,0.1);
        }
        
        .signal-down-text {
            color: #2ed573;
            background: rgba(46,213,115,0.1);
        }
        
        .signal-none {
            color: #999;
            background: rgba(0,0,0,0.05);
        }
        
        .mini-chart {
            margin-top: 15px;
            height: 60px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 10px;
            background: #fafafa;
            border-radius: 8px;
        }
        
        .chart-bar {
            flex: 1;
            margin: 0 1px;
            background: #ddd;
            border-radius: 2px 2px 0 0;
            min-height: 5px;
        }
        
        .loading {
            text-align: center;
            padding: 80px 20px;
            color: white;
        }
        
        .loading-spinner {
            font-size: 48px;
            margin-bottom: 20px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .error {
            background: rgba(255,255,255,0.95);
            color: #c00;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            margin: 40px auto;
            max-width: 500px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: white;
        }
        
        .info-panel {
            background: rgba(255,255,255,0.95);
            padding: 20px 25px;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        
        .info-panel h4 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 15px;
        }
        
        .info-panel p {
            color: #666;
            font-size: 13px;
            line-height: 1.8;
        }
        
        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .filter-tab {
            padding: 8px 20px;
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        
        .filter-tab:hover {
            background: white;
        }
        
        .filter-tab.active {
            background: #667eea;
            color: white;
        }
        
        @media (max-width: 768px) {
            .stock-grid {
                grid-template-columns: 1fr;
            }
            
            .legend-bar {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .stats-bar {
                margin-left: 0;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔮 神奇九转选股系统</h1>
            <p class="subtitle">基于 TD Sequential 序列的A股技术分析工具｜15只核心股票实时监控</p>
            <div class="update-info">
                <span class="update-time" id="updateTime">正在加载数据...</span>
                <button class="refresh-btn" onclick="refreshData()">🔄 刷新数据</button>
            </div>
        </header>
        
        <div class="info-panel">
            <h4>📖 神奇九转法说明</h4>
            <p>
                <strong style="color:#ff4757">上涨9转（🔴 顶部预警）：</strong>连续9根K线收盘价 &lt; 前第4根，暗示可能回调&nbsp;&nbsp;
                <strong style="color:#2ed573">下跌9转（🟢 底部预警）：</strong>连续9根K线收盘价 &gt; 前第4根，暗示可能反弹<br>
                <strong>数据来源：</strong>A股真实交易数据，每日收盘后自动更新
            </p>
        </div>
        
        <div class="legend-bar">
            <div class="legend-item">
                <div class="legend-box legend-up"></div>
                <span>上涨9转(顶部预警)</span>
            </div>
            <div class="legend-item">
                <div class="legend-box legend-down"></div>
                <span>下跌9转(底部预警)</span>
            </div>
            <div class="legend-item">
                <div class="legend-box legend-none"></div>
                <span>暂无信号</span>
            </div>
            
            <div class="stats-bar" id="statsBar">
                <div class="stat-item">加载中...</div>
            </div>
        </div>
        
        <div class="filter-tabs" id="filterTabs">
            <button class="filter-tab active" onclick="filterStocks('all')">全部</button>
            <button class="filter-tab" onclick="filterStocks('up')">上涨9转</button>
            <button class="filter-tab" onclick="filterStocks('down')">下跌9转</button>
        </div>
        
        <div id="stockContainer" class="stock-grid">
            <div class="loading">
                <div class="loading-spinner">⏳</div>
                <p>正在加载股票数据...</p>
            </div>
        </div>
    </div>

    <script>
        let allStocks = [];
        let currentFilter = 'all';
        
        // 加载数据
        async function loadData() {
            const container = document.getElementById('stockContainer');
            
            try {
                // 添加时间戳防止缓存
                const response = await fetch('stock_data.json?t=' + Date.now());
                
                if (!response.ok) {
                    throw new Error('数据加载失败');
                }
                
                const data = await response.json();
                allStocks = data.stocks;
                
                // 更新更新时间
                document.getElementById('updateTime').textContent = 
                    '数据更新时间: ' + data.updateTime;
                
                // 更新统计
                updateStats(data);
                
                // 渲染股票
                renderStocks();
                
            } catch (error) {
                console.error('加载数据失败:', error);
                container.innerHTML = `
                    <div class="error">
                        <h3>⚠️ 数据加载失败</h3>
                        <p>${error.message}</p>
                        <p style="margin-top:15px;font-size:12px;color:#666">
                            可能原因：数据文件不存在或网络问题<br>
                            请稍后刷新重试
                        </p>
                    </div>
                `;
            }
        }
        
        // 更新统计信息
        function updateStats(data) {
            const upCount = data.stocks.filter(s => s.upSequence === 9).length;
            const downCount = data.stocks.filter(s => s.downSequence === 9).length;
            
            document.getElementById('statsBar').innerHTML = `
                <div class="stat-item">📊 共 ${data.count} 只</div>
                <div class="stat-item" style="color:#ff4757">🔴 上涨9转: ${upCount} 只</div>
                <div class="stat-item" style="color:#2ed573">🟢 下跌9转: ${downCount} 只</div>
            `;
        }
        
        // 过滤股票
        function filterStocks(type) {
            currentFilter = type;
            
            // 更新标签样式
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderStocks();
        }
        
        // 渲染股票卡片
        function renderStocks() {
            const container = document.getElementById('stockContainer');
            
            // 根据过滤条件筛选
            let stocks = allStocks;
            if (currentFilter === 'up') {
                stocks = allStocks.filter(s => s.upSequence === 9);
            } else if (currentFilter === 'down') {
                stocks = allStocks.filter(s => s.downSequence === 9);
            }
            
            // 按信号强度排序（有信号的排在前面）
            stocks.sort((a, b) => {
                const aSignal = a.upSequence === 9 || a.downSequence === 9 ? 1 : 0;
                const bSignal = b.upSequence === 9 || b.downSequence === 9 ? 1 : 0;
                return bSignal - aSignal;
            });
            
            if (stocks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size:48px">📭</div>
                        <p>该条件下暂无股票</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = stocks.map(stock => renderStockCard(stock)).join('');
        }
        
        // 渲染单张股票卡片
        function renderStockCard(stock) {
            const isUp = stock.changePercent >= 0;
            const priceClass = isUp ? 'price-up' : 'price-down';
            const changeSign = isUp ? '+' : '';
            
            // 市场标签
            const market = stock.market || 'A';
            const marketClass = `market-${market.toLowerCase()}`;
            const marketText = market === 'A' ? 'A股' : market === 'HK' ? '港股' : '美股';
            const currency = market === 'US' ? '$' : '¥';
            
            // 判断信号类型
            let signalClass = '';
            let signalText = '';
            let signalTextClass = 'signal-none';
            
            if (stock.upSequence === 9) {
                signalClass = 'signal-up';
                signalText = '🔴 上涨9转 - 顶部预警，注意回调风险';
                signalTextClass = 'signal-up-text';
            } else if (stock.downSequence === 9) {
                signalClass = 'signal-down';
                signalText = '🟢 下跌9转 - 底部预警，关注反弹机会';
                signalTextClass = 'signal-down-text';
            } else {
                signalText = '⚪ 暂无九转信号';
            }
            
            // 生成序列点
            let sequenceHTML = '';
            const currentUp = stock.upSequence;
            const currentDown = stock.downSequence;
            const isUpSeq = currentUp > 0;
            
            for (let i = 1; i <= 9; i++) {
                let dotClass = '';
                if (isUpSeq) {
                    if (i < currentUp) dotClass = 'active';
                    else if (i === currentUp) dotClass = 'up-highlight';
                } else {
                    if (i < currentDown) dotClass = 'active';
                    else if (i === currentDown) dotClass = 'down-highlight';
                }
                sequenceHTML += `<div class="seq-dot ${dotClass}">${i}</div>`;
            }
            
            // 生成迷你K线图
            const prices = stock.prices;
            const minPrice = Math.min(...prices.map(p => p.low));
            const maxPrice = Math.max(...prices.map(p => p.high));
            const range = maxPrice - minPrice || 1;
            
            const chartHTML = prices.slice(-10).map(p => {
                const height = ((p.close - minPrice) / range * 50 + 10);
                const color = p.close >= p.open ? '#ff4757' : '#2ed573';
                return `<div class="chart-bar" style="height:${height}px;background:${color}"></div>`;
            }).join('');
            
            return `
                <div class="stock-card ${signalClass}">
                    <div class="stock-header">
                        <div class="stock-info">
                            <h3>${stock.name}<span class="market-tag ${marketClass}">${marketText}</span></h3>
                            <span class="stock-code">${stock.code}</span>
                        </div>
                        <div class="price-section">
                            <div class="current-price ${priceClass}">${currency}${stock.currentPrice.toFixed(2)}</div>
                            <div class="change-pct ${priceClass}">${changeSign}${stock.changePercent.toFixed(2)}%</div>
                        </div>
                    </div>
                    
                    <div class="signal-section">
                        <div class="signal-title">九转序列（最近9天收盘价 vs 4天前）</div>
                        <div class="sequence-row">
                            ${sequenceHTML}
                        </div>
                        <div class="signal-text ${signalTextClass}">
                            ${signalText}
                        </div>
                    </div>
                    
                    <div class="mini-chart">
                        ${chartHTML}
                    </div>
                </div>
            `;
        }
        
        // 刷新数据
        async function refreshData() {
            const btn = document.querySelector('.refresh-btn');
            btn.disabled = true;
            btn.textContent = '⏳ 刷新中...';
            
            await loadData();
            
            btn.disabled = false;
            btn.textContent = '🔄 刷新数据';
        }
        
        // 页面加载时自动加载数据
        document.addEventListener('DOMContentLoaded', loadData);
        
        // 每30秒自动刷新
        setInterval(loadData, 30000);
    </script>
</body>
</html>
