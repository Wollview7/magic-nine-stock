<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神奇九转选股系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .controls {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        input[type="text"] {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            width: 200px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 10px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #5a6fd6;
            transform: translateY(-1px);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .legend {
            display: flex;
            gap: 20px;
            margin-left: auto;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
        }
        
        .legend-box {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        
        .legend-up { background: #ff4757; }
        .legend-down { background: #2ed573; }
        
        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .stock-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }
        
        .stock-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        
        .stock-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: #ddd;
        }
        
        .stock-card.signal-up::before { background: #ff4757; }
        .stock-card.signal-down::before { background: #2ed573; }
        
        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .stock-name {
            font-size: 18px;
            font-weight: 600;
        }
        
        .stock-code {
            font-size: 12px;
            color: #999;
            margin-left: 8px;
        }
        
        .price {
            font-size: 24px;
            font-weight: 700;
        }
        
        .price-up { color: #ff4757; }
        .price-down { color: #2ed573; }
        
        .change {
            font-size: 14px;
            margin-left: 10px;
        }
        
        .signal-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }
        
        .signal-title {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .sequence {
            display: flex;
            gap: 5px;
            justify-content: center;
        }
        
        .seq-number {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            background: #e0e0e0;
            color: #666;
        }
        
        .seq-number.active {
            background: #667eea;
            color: white;
        }
        
        .seq-number.highlight {
            background: #ff4757;
            color: white;
            animation: pulse 1s infinite;
        }
        
        .seq-number.highlight-down {
            background: #2ed573;
            color: white;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .signal-text {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .signal-up-text { color: #ff4757; }
        .signal-down-text { color: #2ed573; }
        
        .no-signal { color: #999; }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #999;
        }
        
        .error {
            background: #ffe0e0;
            color: #c00;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        .info-panel {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .info-panel h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #667eea;
        }
        
        .info-panel p {
            font-size: 13px;
            color: #666;
            line-height: 1.8;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔮 神奇九转选股系统</h1>
            <p class="subtitle">基于 TD Sequential 序列的A股技术分析工具</p>
        </header>
        
        <div class="info-panel">
            <h3>📖 神奇九转法说明</h3>
            <p>
                <strong>上涨9转（🔴 顶部预警）：</strong>连续9根K线，每根收盘价 ＜ 前第4根收盘价，暗示可能回调<br>
                <strong>下跌9转（🟢 底部预警）：</strong>连续9根K线，每根收盘价 ＞ 前第4根收盘价，暗示可能反弹<br>
                <br>
                <strong>注意：</strong>当前使用模拟数据演示，接入实时数据需要后端API支持
            </p>
        </div>
        
        <div class="controls">
            <input type="text" id="stockInput" placeholder="输入股票代码，如：600519">
            <button onclick="addStock()">➕ 添加股票</button>
            <button onclick="refreshAll()">🔄 刷新数据</button>
            <button onclick="loadDemoData()">📊 加载示例</button>
            
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-box legend-up"></div>
                    <span>上涨9转(顶部)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-box legend-down"></div>
                    <span>下跌9转(底部)</span>
                </div>
            </div>
        </div>
        
        <div id="stockContainer" class="stock-grid">
            <div class="empty-state">
                <div class="empty-state-icon">📈</div>
                <p>点击"加载示例"或输入股票代码开始分析</p>
            </div>
        </div>
    </div>

    <script>
        // 股票数据存储
        let stocks = [];
        
        // 模拟股票数据生成器
        function generateMockData(stockCode, days = 15) {
            const prices = [];
            let basePrice = 50 + Math.random() * 100;
            
            for (let i = 0; i < days; i++) {
                const change = (Math.random() - 0.5) * 0.05;
                basePrice = basePrice * (1 + change);
                prices.push({
                    date: new Date(Date.now() - (days - i) * 86400000).toISOString().split('T')[0],
                    close: parseFloat(basePrice.toFixed(2)),
                    open: parseFloat((basePrice * (1 + (Math.random() - 0.5) * 0.02)).toFixed(2)),
                    high: parseFloat((basePrice * 1.02).toFixed(2)),
                    low: parseFloat((basePrice * 0.98).toFixed(2))
                });
            }
            
            return prices;
        }
        
        // 计算神奇九转序列
        function calculateTDSequential(prices) {
            const closes = prices.map(p => p.close);
            const upSequence = new Array(closes.length).fill(0);
            const downSequence = new Array(closes.length).fill(0);
            
            // 计算上涨序列（熊市反转）
            for (let i = 4; i < closes.length; i++) {
                if (closes[i] < closes[i - 4]) {
                    upSequence[i] = upSequence[i - 1] + 1;
                    if (upSequence[i] > 9) upSequence[i] = 1; // 重置
                } else {
                    upSequence[i] = 0;
                }
            }
            
            // 计算下跌序列（牛市反转）
            for (let i = 4; i < closes.length; i++) {
                if (closes[i] > closes[i - 4]) {
                    downSequence[i] = downSequence[i - 1] + 1;
                    if (downSequence[i] > 9) downSequence[i] = 1; // 重置
                } else {
                    downSequence[i] = 0;
                }
            }
            
            return { upSequence, downSequence };
        }
        
        // 获取股票名称
        function getStockName(code) {
            const names = {
                '600519': '贵州茅台',
                '000001': '平安银行',
                '000858': '五粮液',
                '002415': '海康威视',
                '300750': '宁德时代',
                '601318': '中国平安',
                '000333': '美的集团',
                '002594': '比亚迪',
                '600036': '招商银行',
                '000568': '泸州老窖'
            };
            return names[code] || `股票${code}`;
        }
        
        // 渲染股票卡片
        function renderStockCard(stock) {
            const currentPrice = stock.prices[stock.prices.length - 1].close;
            const prevPrice = stock.prices[stock.prices.length - 2].close;
            const change = ((currentPrice - prevPrice) / prevPrice * 100).toFixed(2);
            const isUp = change >= 0;
            
            const { upSequence, downSequence } = calculateTDSequential(stock.prices);
            const currentUp = upSequence[upSequence.length - 1];
            const currentDown = downSequence[downSequence.length - 1];
            
            let signalClass = '';
            let signalText = '';
            let signalTextClass = '';
            
            if (currentUp === 9) {
                signalClass = 'signal-up';
                signalText = '🔴 上涨9转 - 顶部预警，注意回调风险';
                signalTextClass = 'signal-up-text';
            } else if (currentDown === 9) {
                signalClass = 'signal-down';
                signalText = '🟢 下跌9转 - 底部预警，关注反弹机会';
                signalTextClass = 'signal-down-text';
            } else {
                signalText = '暂无九转信号';
                signalTextClass = 'no-signal';
            }
            
            // 生成序列显示
            let sequenceHTML = '';
            const activeSequence = currentUp > 0 ? upSequence : downSequence;
            const currentValue = currentUp > 0 ? currentUp : currentDown;
            
            for (let i = 1; i <= 9; i++) {
                let seqClass = '';
                if (i < currentValue) {
                    seqClass = 'active';
                } else if (i === currentValue) {
                    seqClass = currentUp > 0 ? 'highlight' : 'highlight-down';
                }
                sequenceHTML += `<div class="seq-number ${seqClass}">${i}</div>`;
            }
            
            return `
                <div class="stock-card ${signalClass}">
                    <div class="stock-header">
                        <div>
                            <span class="stock-name">${stock.name}</span>
                            <span class="stock-code">${stock.code}</span>
                        </div>
                        <div>
                            <span class="price ${isUp ? 'price-up' : 'price-down'}">
                                ¥${currentPrice.toFixed(2)}
                            </span>
                            <span class="change ${isUp ? 'price-up' : 'price-down'}">
                                ${isUp ? '+' : ''}${change}%
                            </span>
                        </div>
                    </div>
                    
                    <div class="signal-box">
                        <div class="signal-title">九转序列（最近9天收盘价 vs 4天前）</div>
                        <div class="sequence">
                            ${sequenceHTML}
                        </div>
                        <div class="signal-text ${signalTextClass}">
                            ${signalText}
                        </div>
                    </div>
                </div>
            `;
        }
        
        // 渲染所有股票
        function renderAll() {
            const container = document.getElementById('stockContainer');
            if (stocks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📈</div>
                        <p>点击"加载示例"或输入股票代码开始分析</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = stocks.map(stock => renderStockCard(stock)).join('');
        }
        
        // 添加股票
        function addStock() {
            const input = document.getElementById('stockInput');
            const code = input.value.trim();
            
            if (!code) {
                alert('请输入股票代码');
                return;
            }
            
            // 检查是否已存在
            if (stocks.find(s => s.code === code)) {
                alert('该股票已添加');
                return;
            }
            
            // 生成模拟数据
            const prices = generateMockData(code);
            const name = getStockName(code);
            
            stocks.push({
                code: code,
                name: name,
                prices: prices
            });
            
            input.value = '';
            renderAll();
        }
        
        // 刷新所有数据
        function refreshAll() {
            stocks.forEach(stock => {
                stock.prices = generateMockData(stock.code);
            });
            renderAll();
        }
        
        // 加载示例数据
        function loadDemoData() {
            const demoStocks = ['600519', '000001', '300750', '002415'];
            stocks = [];
            
            demoStocks.forEach(code => {
                stocks.push({
                    code: code,
                    name: getStockName(code),
                    prices: generateMockData(code, 20)
                });
            });
            
            renderAll();
        }
        
        // 回车键添加
        document.getElementById('stockInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addStock();
            }
        });
        
        // 自动刷新（每30秒）
        setInterval(() => {
            if (stocks.length > 0) {
                refreshAll();
            }
        }, 30000);
    </script>
</body>
</html>
